# Render Blueprint: https://render.com/docs/infrastructure-as-code
# ダッシュボードでリポジトリと接続後、「Blueprint」からこのファイルで Web サービスを作成可能。
services:
  - type: web
    runtime: docker
    name: oshi-app
    plan: free
    region: oregon
    healthCheckPath: /login
    envVars:
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: Lax
      - key: SUPABASE_SECRET_DEFAULT_KEY
        sync: false
      - key: IO_INTELLIGENCE_API_KEY
        sync: false
      - key: RAKUTEN_APPLICATION_ID
        sync: false
      - key: RAKUTEN_AFFILIATE_ID
        sync: false
